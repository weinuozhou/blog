<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="我的个人博客网站, 收集整理和提炼大数据相关知识">
  <meta name="keywords" content="数据库, MySQL, python,大数据">
  <meta name="author" content="zhouweinuo">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <title>weinuo's NoteBook</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <!-- docsify主题样式 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <!-- 数学公式渲染样式 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.css" />
  <!-- 左侧侧边栏 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
  <style>
    /* 一级标题的样式 */
    .markdown-section h1 {
      font-size: 36px;
      text-align: center;
    }
    /* 加重描述 strong*/
    .markdown-section strong {
      color: rgb(239, 112, 96);
    }
    /* 倾斜 em*/
    .markdown-section em {
      font-style: italic;
      color: #3498db;
      /* 深紫色 */
      font-weight: 500;
      /* 稍微加粗一点 */
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
      /* 添加文字阴影效果 */
      transform: skewX(-10deg);
      /* 倾斜10度 */
      display: inline-block;
      /* 确保转换效果生效 */
    }
    /* 链接 */
    .markdown-section a:not(:hover) {
      text-decoration: none;
      transition: color 0.3s ease, text-decoration 0.3s ease;
    }

    /* 滚动条整体样式 */
    ::-webkit-scrollbar {
      width: 12px;
      /* 宽度 */
      height: 12px;
      /* 高度 */
    }

    /* 滚动条轨道 */
    ::-webkit-scrollbar-track {
      background-color: #f1f1f1;
      /* 轨道颜色 */
      border-radius: 6px;
      /* 轨道圆角 */
      box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.1);
      /* 轨道阴影 */
    }

    /* 滚动条滑块 */
    ::-webkit-scrollbar-thumb {
      background-color: #c1c1c1;
      /* 滑块颜色 */
      border-radius: 6px;
      /* 滑块圆角 */
      box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.1);
      /* 滑块阴影 */
      background-image: -webkit-linear-gradient(45deg, #9b59b6, #3498db);
      /* 滑块渐变背景 */
      background-size: 100% 100%;
      /* 渐变背景尺寸 */
      background-origin: content-box;
      /* 渐变背景原点 */
    }

    /* 滚动条滑块hover状态 */
    ::-webkit-scrollbar-thumb:hover {
      background-color: #a8a8a8;
      /* hover时滑块颜色 */
    }

    /* 滚动条角落 */
    ::-webkit-scrollbar-corner {
      background-color: #f1f1f1;
      /* 角落颜色 */
    }

    .markdown-section pre {
      background-color: #212121;
      border: 0;
      border-radius: 4px;
      padding: 0;
    }

    .markdown-section code {
      font-size: 16px !important;
      margin: 0 2px;
      padding: 0;
      white-space: nowrap;
      border: 1px solid #282c34;
      border-radius: 2px;
      color: rgb(184, 101, 208);
    }

    .markdown-section pre>code {
      font-family: consolas, "PingFang SC", "Microsoft YaHei", monospace;
      font-size: 16px;
      line-height: 1.5;
      tab-size: 4;
      border-radius: .3em;
      background-color: #212121;
    }

    .markdown-section pre:before {
      content: '';
      display: block;
      background: url(https://cdn.jsdelivr.net/gh/weno861/image@main/img/202404131540422.png) no-repeat 10px 10px;
      height: 30px;
      background-size: 40px;
      background-color: #1C1C1C;
    }
  </style>
</head>
<body>
  <div id="app">
    <div>🏃‍🏃‍🏃‍💨 Loading...</div>
    <div>
      <img src="coverpage.png" alt="coverpage">
    </div>
  </div>
  <script>
    window.$docsify = {
      name: "weinuo's NoteBook",
      repo: 'https://github.com/weinuozhou/blog',
      loadNavbar: true,
      // 开启侧边栏，需要目录下有_sidebar.md文件
      loadSidebar: true,
      // 读取md文件中最大几级目录
      subMaxLevel: 2,
      // 切换页面后跳回页面顶部
      auto2top: true,
      //开启封面页，需要目录下有_coverpage.md文件
      coverpage: true,
      onlyCover: true,
      topMargin: true,
      // 移动设备合并导航栏到侧边栏
      mergeNavbar: true,
      executeScript: true,
      externalLinkTarget: '_blank',
      // 加载_404.md
      notFoundPage: true,
      // 滚动到锚点是与顶部的距离
      topMargin: 90,
      //插件设置
      // -----------------------------------------------------
      // 搜索配置
      search: {
        maxAge: 8640000,
        paths: 'auto',
        placeholder: '搜索',
        noData: '找不到结果...换个关键词试试',
        depth: 6,
        hideOtherSidebarContent: false,
      },
      // 字数插件
      count: {
        countable: true,
        position: 'top',
        margin: '50px',
        float: 'top',
        fontsize: '0.9em',
        color: '#71C8DC',
        language: 'chinese',
        localization: {
          words: "",
          minute: ""
        },
        isExpected: true,
      },
      // 分页导航插件
      pagination: {
        previousText: 'Privious',
        nextText: 'Next',
        crossChapter: true,
        crossChapterText: true
      },
      // 文本高亮
      'flexible-alerts': {
        style: 'flat',
        note: {
          label: "信息"
        },
        tip: {
          label: "提示"
        },
        warning: {
          label: "注意"
        },
        attention: {
          label: "切记"
        }
      },
      sidebarDisplayLevel: 2,
      // 页脚信息插件
      loadFooter: true,
      loadFooter: '_footer.md',
      hideCode: {
        scroll: false, // Enable scrolling
        height: 300 // Max height
      },
      Valine: {
        appId: 'SrSPp72C1NMpnJtkD8VouCmA-MdYXbMMI',
        appKey: '2ZwxxfCyiRDAFQ4SLdGX3bGz',
        // docPath: 'hash', //default to `hash` ,or you can choose `full`
      }
    }
  </script>
  <!-- docsify依赖插件 -->
  <script src="//unpkg.com/docsify/lib/docsify.min.js"></script>
  <!-- 数学公式渲染 -->
  <script src="//cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/marked@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-katex@latest/dist/docsify-katex.js"></script>
  <!-- 图片缩放插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <!-- 复制代码插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- 全文搜索插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- sql代码高亮 -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <!-- 文本高亮 -->
  <script src="https://unpkg.com/docsify-plugin-flexible-alerts"></script>
  <!-- 页脚信息 -->
  <script src="//cdn.jsdelivr.net/npm/@alertbox/docsify-footer/dist/docsify-footer.min.js"></script>
  <!-- 自动添加空格 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pangu/lib/pangu.min.js"></script>
  <!-- 字数统计插件 -->
  <script src="//unpkg.com/docsify-count/dist/countable.js"></script>
  <!-- 更新时间 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-updated/src/time-updater.min.js"></script>
  <!-- 左侧侧边栏 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <!-- 分页导航 -->
  <script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <!-- 长代码进行隐藏 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-hide-code/dist/docsify-hide-code.min.js"></script>
  <!-- 看板娘 -->
  <script src="https://newzone.top/live2d-widget/live2d.min.js"></script>
  <script>
    L2Dwidget.init({
      "model": {
        //jsonpath控制显示那个小萝莉模型，
        //(切换模型需要改动)
        jsonPath: "https://unpkg.com/live2d-widget-model-koharu@1.0.5/assets/koharu.model.json",
        "scale": 1
      },
      "display": {
        "position": "right", //看板娘的表现位置
        "width": 70,  //小萝莉的宽度
        "height": 140, //小萝莉的高度
        "hOffset": 35,
        "vOffset": -20
      },
      "mobile": {
        "show": true,
        "scale": 0.5
      },
      "react": {
        "opacityDefault": 0.7,
        "opacityOnHover": 0.2
      }
    });
  </script>
  <!-- 回到顶部功能 -->
  <script src="https://notebook.js.org/plugin/jquery.js"></script>
  <script src="https://notebook.js.org/plugin/jquery.goup.js"></script>
  <script type="text/javascript">
    $(document).ready(function () {
      $.goup({
        trigger: 100,
        bottomOffset: 52,
        locationOffset: 25,
        //title: 'TOP',
        titleAsText: true
      });
    });
  </script>
  <!-- mouse click -->
  <script>

</html>
