<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="我的个人博客网站, 收集整理和提炼大数据相关知识">
  <meta name="keywords" content="数据库, MySQL, python,大数据">
  <meta name="author" content="zhouweinuo">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <title>个人博客</title>
  <link rel="icon" href="./favicon.ico" type="image/x-icon">
  <!-- docsify主题样式 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <!-- 数学公式渲染样式 -->v
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.css" />
  <!-- 侧边栏样式 -->
  <link rel="stylesheet" href="https://unpkg.com/docsify-toc@1.0.0/dist/toc.css">
  <!-- 左侧侧边栏 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
  <div id="app">
    <span>很快 等我一下...</span>
    <div>
      <img src="coverpage.png" alt="coverpage">
    </div>
  </div>
  <script>
    window.$docsify = {
      name: 'weinuo的个人技术博客',
      repo: 'https://github.com/weinuozhou/blog',
      loadNavbar: true,
      // 开启侧边栏，需要目录下有_sidebar.md文件
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      loadSidebar: true,
      // 读取md文件中最大几级目录
      subMaxLevel: 2,
      // 切换页面后跳回页面顶部
      auto2top: true,
      //开启封面页，需要目录下有_coverpage.md文件
      coverpage: true,
      // 禁用emoji
      noEmoji: true,
      // 移动设备合并导航栏到侧边栏
      mergeNavbar: true,
      // 加载_404.md
      notFoundPage: true,
      // 滚动到锚点是与顶部的距离
      topMargin: 90,
      //插件设置
      // -----------------------------------------------------
      // 搜索配置
      search: {
        maxAge: 86400000000000,
        paths: 'auto',
        placeholder: '搜索',
        noData: '找不到结果...换个关键词试试',
        depth: 6,
        hideOtherSidebarContent: false,
      },
      // 字数插件
      count: {
        countable: true,
        position: 'top',
        margin: '50px',
        float: 'top',
        fontsize: '0.9em',
        color: '#71C8DC',
        language: 'chinese',
        localization: {
          words: "",
          minute: ""
        },
        isExpected: true,
      },
      // 分页导航插件
      pagination: {
        previousText: 'Privious',
        nextText: 'Next',
        crossChapter: true,
        crossChapterText: true
      },
      // 文本高亮
      'flexible-alerts': {
        style: 'flat',
        note: {
          label: "信息"
        },
        tip: {
          label: "提示"
        },
        warning: {
          label: "注意"
        },
        attention: {
          label: "切记"
        }
      },
      sidebarDisplayLevel: 2,
      // 页脚信息插件
      loadFooter: true,
      loadFooter: '_footer.md',
      toc: {
        scope: '.markdown-section',
        headings: 'h1, h2, h3',
        title: 'Table of Contents',
      },
    }
  </script>
  <!-- docsify依赖插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify"></script>
  <!-- 数学公式渲染 -->
  <script src="//cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/marked@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-katex@latest/dist/docsify-katex.js"></script>
  <!-- 图片缩放插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <!-- 复制代码插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- 全文搜索插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- sql代码高亮 -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <!-- 分页导航 -->
  <script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <!-- 文本高亮 -->
  <script src="https://unpkg.com/docsify-plugin-flexible-alerts"></script>
  <!-- 页脚信息 -->
  <script src="//cdn.jsdelivr.net/npm/@alertbox/docsify-footer/dist/docsify-footer.min.js"></script>
  <!-- 自动添加空格 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pangu/lib/pangu.min.js"></script>
  <!-- 右侧侧边栏目录插件 -->
  <script src="https://unpkg.com/docsify-toc@1.0.0/dist/toc.js"></script>
  <!-- 字数统计插件 -->
  <script src="//unpkg.com/docsify-count/dist/countable.js"></script>
  <!-- 更新时间 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-updated/src/time-updater.min.js"></script>
  <!-- 左侧侧边栏 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
</html>
